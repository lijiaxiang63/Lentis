name: Release

# Fires when a version tag is pushed, e.g.:
#   git tag v1.5.0 && git push origin v1.5.0
# Builds the release DMG and publishes a GitHub Release with brief notes.
# Manual runs (workflow_dispatch) build the DMG as an artifact without releasing.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # required for the job's GITHUB_TOKEN to create the Release

jobs:
  release:
    # macos-26 provides Xcode 26 (Swift 6.2+) and the macOS 26 SDK, both required:
    # Package.swift pins .macOS(.v26) for the Liquid Glass UI. macos-15 fails.
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0 # need full history + tags to build the changelog

      - name: Resolve version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="dev-$(git rev-parse --short HEAD)"
          fi
          # Marketing version (CFBundleShortVersionString) must be dotted-numeric:
          # strip a leading "v" and keep the leading X.Y.Z core, dropping any
          # pre-release suffix (e.g. v1.5.0-beta -> 1.5.0). Falls back to 0.0.0.
          MARKETING="$(printf '%s' "${VERSION#v}" | grep -oE '^[0-9]+(\.[0-9]+)*' || true)"
          MARKETING="${MARKETING:-0.0.0}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "marketing=${MARKETING}" >> "$GITHUB_OUTPUT"
          echo "Building Lentis ${VERSION} (marketing ${MARKETING}, build ${GITHUB_RUN_NUMBER})"

      - name: Build app bundle + DMG
        env:
          # Stamp the bundle version from the tag instead of the script defaults.
          LENTIS_MARKETING_VERSION: ${{ steps.version.outputs.marketing }}
          LENTIS_BUILD_VERSION: ${{ github.run_number }}
          # Sparkle EdDSA public key (base64) — baked into Info.plist as
          # SUPublicEDKey so the app can verify update signatures. Non-secret;
          # stored as a repository variable. Empty/unset → EdDSA verification
          # disabled (fine until keys are generated). See scripts/sparkle_tools.swift.
          LENTIS_SPARKLE_PUBLIC_KEY: ${{ vars.LENTIS_SPARKLE_PUBLIC_KEY }}
        run: ./scripts/package_app.sh

      - name: Name the DMG with the version
        id: dmg
        run: |
          DMG="Lentis-${{ steps.version.outputs.version }}.dmg"
          mv Lentis.dmg "${DMG}"
          echo "path=${DMG}" >> "$GITHUB_OUTPUT"
          shasum -a 256 "${DMG}" | tee "${DMG}.sha256"

      - name: Generate release notes
        if: startsWith(github.ref, 'refs/tags/')
        id: notes
        env:
          VERSION: ${{ steps.version.outputs.version }}
          DMG: ${{ steps.dmg.outputs.path }}
        run: |
          # Previous tag (if any) bounds the changelog; first release lists recent history.
          PREV="$(git describe --tags --abbrev=0 "${VERSION}^" 2>/dev/null || true)"
          if [[ -n "${PREV}" ]]; then
            RANGE="${PREV}..${VERSION}"
            COMPARE="**Full changelog:** https://github.com/${GITHUB_REPOSITORY}/compare/${PREV}...${VERSION}"
          else
            RANGE=""
            COMPARE=""
          fi

          SHA256="$(cut -d' ' -f1 "${DMG}.sha256")"

          {
            echo "## Lentis ${VERSION}"
            echo
            echo "Native macOS NIFTI brain viewer (CT + MRI)."
            echo
            echo "### Changes"
            git log --no-merges --pretty=format:'- %s' ${RANGE} | head -n 40
            echo
            echo
            echo "### Install"
            echo "1. Download \`${DMG}\` below."
            echo "2. Open it and drag **Lentis.app** to **Applications**."
            echo
            echo "> The app is ad-hoc signed, not notarized. On first launch, right-click **Lentis.app → Open**, then confirm — or allow it under **System Settings → Privacy & Security**. Requires **macOS 26** or later (Apple Silicon)."
            echo
            echo "\`SHA-256: ${SHA256}\`"
            echo
            echo "${COMPARE}"
          } > release-notes.md

          echo "----- release notes -----"
          cat release-notes.md

          # Sparkle's update prompt should show just the changelog text, not the
          # GitHub install instructions meant for first-time downloads.
          awk '/^### Install$/ { exit } { print }' release-notes.md > sparkle-release-notes.md

      - name: Sign DMG + generate Sparkle appcast
        id: appcast
        if: startsWith(github.ref, 'refs/tags/')
        env:
          # EdDSA private key (base64 32-byte seed). When absent, the step
          # no-ops (no appcast) so releases still publish the DMG; set the
          # secret to enable in-app auto-update. See scripts/sparkle_tools.swift.
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
          # Public key (base64) — must match the private key AND be the same
          # value the build step baked into Info.plist as SUPublicEDKey. Sourced
          # from the repo variable so a mismatch is impossible by construction.
          LENTIS_SPARKLE_PUBLIC_KEY: ${{ vars.LENTIS_SPARKLE_PUBLIC_KEY }}
          VERSION: ${{ steps.version.outputs.version }}
          MARKETING: ${{ steps.version.outputs.marketing }}
          BUILD: ${{ github.run_number }}
          DMG: ${{ steps.dmg.outputs.path }}
        run: |
          if [[ -z "${SPARKLE_PRIVATE_KEY}" ]]; then
            echo "SPARKLE_PRIVATE_KEY not set — skipping appcast (set the repo secret to enable auto-update)."
            exit 0
          fi
          # Hard gate: a signed appcast is only useful if the app it ships with
          # embeds the matching public key (SUPublicEDKey, baked in by the build
          # step from LENTIS_SPARKLE_PUBLIC_KEY). If the public var is missing or
          # empty, the DMG's app can't verify EdDSA-signed updates — so refuse to
          # publish an appcast rather than strand that release's installs. Set
          # the LENTIS_SPARKLE_PUBLIC_KEY repo variable (it must be the public
          # half of the SPARKLE_PRIVATE_KEY secret) to enable auto-update.
          if [[ -z "${LENTIS_SPARKLE_PUBLIC_KEY}" ]]; then
            echo "::error::SPARKLE_PRIVATE_KEY is set but LENTIS_SPARKLE_PUBLIC_KEY is missing/empty. The built app has no SUPublicEDKey, so a signed appcast would strand installs (they couldn't verify future updates). Add the matching public key as a repo variable, or remove the private key to publish a DMG-only release."
            exit 1
          fi
          # Key-pair integrity check: derive the public key from the private key
          # and compare to the repo variable. Catches a copy/paste from the wrong
          # keypair (or a typo) — both keys present but mismatched would still
          # strand installs on a release that can't verify future updates.
          DERIVED_PUB="$(SPARKLE_PRIVATE_KEY="${SPARKLE_PRIVATE_KEY}" swift scripts/sparkle_tools.swift public-key)"
          if [[ "${DERIVED_PUB}" != "${LENTIS_SPARKLE_PUBLIC_KEY}" ]]; then
            echo "::error::LENTIS_SPARKLE_PUBLIC_KEY does not match the public key derived from SPARKLE_PRIVATE_KEY. Expected (derived): ${DERIVED_PUB}, repo variable: ${LENTIS_SPARKLE_PUBLIC_KEY}. Re-run 'swift scripts/sparkle_tools.swift generate' and set BOTH the public repo variable and the private secret from the SAME keypair."
            exit 1
          fi
          # Ed25519 signature over the DMG bytes (interoperable with Sparkle's
          # libsodium verification). Apple CryptoKit, no external deps.
          SIG="$(SPARKLE_PRIVATE_KEY="${SPARKLE_PRIVATE_KEY}" swift scripts/sparkle_tools.swift sign "${DMG}")"
          LENGTH="$(stat -f%z "${DMG}")"
          PUBDATE="$(date -Ru)"
          ENCLOSURE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${VERSION}/${DMG}"
          RELEASE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/tag/${VERSION}"
          xml_escape() {
            sed -e 's/&/\&amp;/g' -e 's/</\&lt;/g' -e 's/>/\&gt;/g'
          }
          {
            echo '<?xml version="1.0" standalone="yes"?>'
            echo '<rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" xmlns:dc="http://purl.org/dc/elements/1.1/">'
            echo '  <channel>'
            echo '    <title>Lentis</title>'
            echo "    <link>${RELEASE_URL}</link>"
            echo '    <description>Most recent changes to Lentis</description>'
            echo '    <language>en</language>'
            echo '    <item>'
            echo "      <title>Lentis ${MARKETING}</title>"
            echo "      <pubDate>${PUBDATE}</pubDate>"
            echo "      <sparkle:version>${BUILD}</sparkle:version>"
            echo "      <sparkle:shortVersionString>${MARKETING}</sparkle:shortVersionString>"
            echo "      <description sparkle:format=\"markdown\">"
            xml_escape < sparkle-release-notes.md
            echo "      </description>"
            echo "      <sparkle:fullReleaseNotesLink>${RELEASE_URL}</sparkle:fullReleaseNotesLink>"
            echo "      <enclosure url=\"${ENCLOSURE_URL}\" sparkle:edSignature=\"${SIG}\" length=\"${LENGTH}\" type=\"application/octet-stream\" />"
            echo '    </item>'
            echo '  </channel>'
            echo '</rss>'
          } > appcast.xml
          echo "----- appcast.xml -----"
          cat appcast.xml
          echo "has_appcast=true" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
          DMG: ${{ steps.dmg.outputs.path }}
          HAS_APPCAST: ${{ steps.appcast.outputs.has_appcast }}
        run: |
          ASSETS=("${DMG}" "${DMG}.sha256")
          if [[ "${HAS_APPCAST}" == "true" ]]; then
            ASSETS+=("appcast.xml")
          fi
          gh release create "${VERSION}" \
            --title "Lentis ${VERSION}" \
            --notes-file release-notes.md \
            "${ASSETS[@]}"

      - name: Upload DMG artifact (manual runs)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.dmg.outputs.path }}
          path: ${{ steps.dmg.outputs.path }}
